<!DOCTYPE html>
<html lang="en">
<head>



<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VBRICK GTM Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="dashboard" style="display:none;">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <svg class="logo" viewBox="0 0 40 40" fill="none" aria-label="VBRICK GTM Intelligence">
        <rect width="40" height="40" rx="8" fill="var(--color-primary)"/>
        <path d="M10 12L20 28L30 12" stroke="var(--color-text-inverse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="20" cy="20" r="3" fill="var(--color-text-inverse)" opacity="0.6"/>
      </svg>
      <div class="logo-text">
        <span class="logo-brand">VBRICK</span>
        <span class="logo-sub">GTM Intel</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item nav-item--changed" data-view="whats_changed">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        <span>What's Changed</span>
        <span class="nav-badge" id="newCount">0</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item active" data-view="overview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Overview</span>
      </button>
      <button class="nav-item" data-view="competitors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>Competitors</span>
      </button>
      <button class="nav-item" data-view="triggers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span>Triggers</span>
      </button>
      <button class="nav-item" data-view="compliance">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Compliance</span>
      </button>
      <button class="nav-item" data-view="fortune500">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M3 10h18M3 7l9-4 9 4"/><path d="M6 10v11M10 10v11M14 10v11M18 10v11"/></svg>
        <span>Fortune 500</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" data-view="account_plans">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Account Plans</span>
      </button>
      <button class="nav-item" data-view="playbook">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Outbound Playbook</span>
      </button>
    </nav>

    <div class="sidebar-settings">
      <div class="setting-group">
        <label class="setting-label">Research Cadence</label>
        <select id="researchCadence" class="setting-select">
          <option value="manual">Manual Only</option>
          <option value="daily">Daily</option>
          <option value="every_other_day">Every Other Day</option>
          <option value="twice_weekly">Twice Weekly</option>
          <option value="weekly">Weekly</option>
        </select>
      </div>
    </div>

    <div class="sidebar-footer">
      <button data-theme-toggle aria-label="Switch to dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <span class="sidebar-time" id="updateTime"></span>
    </div>
  </aside>

  <!-- Mobile Header -->
  <div class="mobile-header">
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="mobile-title">VBRICK GTM Intel</span>
    <button data-theme-toggle aria-label="Switch to dark mode" class="mobile-theme-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="page-title" id="pageTitle">Intelligence Overview</h1>
      <span class="finding-count" id="findingCount">0 findings</span>
    </div>
    <div class="header-right">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search companies, keywords..." autocomplete="off">
      </div>
      <span class="cadence-pill" id="cadencePill" title="Findings within their cadence window are skipped on the next research run" style="display:none;"></span>
      <button class="export-btn" id="exportCsvBtn" title="Export to CSV">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Export CSV</span>
      </button>
      <div class="research-split">
        <button class="research-btn" id="runResearchBtn" title="Run Research Refresh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/><path d="M2.5 11.5a10 10 0 0 1 18.8-4.3"/><path d="M21.5 12.5a10 10 0 0 1-18.8 4.2"/></svg>
          <span>Run Research</span>
        </button>
        <button class="research-btn research-btn--caret" id="runResearchCaret" title="Choose research mode" aria-label="Choose research mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="research-menu" id="researchMenu" role="menu">
          <button class="research-menu-item" data-mode="broad" role="menuitem">
            <div class="research-menu-item-title">Broad market scan</div>
            <div class="research-menu-item-desc">Run all 4 agents across the full ICP (default)</div>
          </button>
          <button class="research-menu-item" data-mode="single" role="menuitem">
            <div class="research-menu-item-title">Single account</div>
            <div class="research-menu-item-desc">Enter one account name and research it deeply</div>
          </button>
          <button class="research-menu-item" data-mode="csv" role="menuitem">
            <div class="research-menu-item-title">Bulk upload (CSV)</div>
            <div class="research-menu-item-desc">Upload a list of accounts to research in one run</div>
          </button>
          <div class="research-menu-divider"></div>
          <button class="research-menu-item" data-mode="plan" role="menuitem">
            <div class="research-menu-item-title">Generate account plan</div>
            <div class="research-menu-item-desc">Overview, stakeholders mapped to challenges, SWOT, positioning</div>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main" id="mainContent">
    <!-- Filters Bar -->
    <div class="filters-bar">
      <div class="filter-group">
        <label class="filter-label">Urgency</label>
        <div class="filter-chips" id="urgencyFilter">
          <button class="chip active" data-value="all">All</button>
          <button class="chip" data-value="3">Critical</button>
          <button class="chip" data-value="2">High</button>
          <button class="chip" data-value="1">Medium</button>
          <button class="chip" data-value="0">Low</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Persona</label>
        <div class="filter-chips" id="personaFilter">
          <button class="chip active" data-value="all">All</button>
          <button class="chip" data-value="IT/Infrastructure">IT/Infra</button>
          <button class="chip" data-value="CISO/Security">CISO</button>
          <button class="chip" data-value="Corporate Communications">Corp Comms</button>
          <button class="chip" data-value="Digital Transformation">DX Lead</button>
          <button class="chip" data-value="Compliance Officer">Compliance</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Region</label>
        <div class="chip-group" id="regionChips">
          <button class="chip active" data-value="all">All</button>
          <button class="chip" data-value="NA">North America</button>
          <button class="chip" data-value="EMEA">EMEA</button>
          <button class="chip" data-value="APAC">APAC</button>
          <button class="chip" data-value="LATAM">LATAM</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Industry</label>
        <select id="industryFilter" class="filter-select">
          <option value="all">All Industries</option>
          <option value="Financial">Financial Services</option>
          <option value="Government">Government / Public Admin</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Defense">Defense / Intelligence</option>
          <option value="Information">Technology / Software</option>
          <option value="Telecom">Telecommunications</option>
          <option value="Manufacturing">Manufacturing</option>
          <option value="Retail">Retail / E-commerce</option>
          <option value="Transport">Transportation</option>
          <option value="Pharma">Pharmaceutical</option>
        </select>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card">
        <div class="kpi-label">Total Findings</div>
        <div class="kpi-value" id="kpiTotal">0</div>
        <div class="kpi-delta positive">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
          Live scan
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Critical + High</div>
        <div class="kpi-value urgent" id="kpiHigh">0</div>
        <div class="kpi-delta warning">Needs action</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Competitor Signals</div>
        <div class="kpi-value" id="kpiCompetitor">0</div>
        <div class="kpi-delta">Displacement ready</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Strategic Triggers</div>
        <div class="kpi-value" id="kpiTriggers">0</div>
        <div class="kpi-delta">RTO, M&amp;A, DX</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Compliance Triggers</div>
        <div class="kpi-value" id="kpiCompliance">0</div>
        <div class="kpi-delta positive">Regulated industries</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Fortune 500 Hits</div>
        <div class="kpi-value" id="kpiFortune">0</div>
        <div class="kpi-delta">Enterprise accounts</div>
      </div>
    </div>

    <!-- Findings Table -->
    <div class="table-container">
      <table class="findings-table">
        <thead>
          <tr>
            <th class="th-urgency">
              <button class="sort-btn" data-sort="urgency">Urgency</button>
            </th>
            <th class="th-company">
              <button class="sort-btn" data-sort="company">Company</button>
            </th>
            <th class="th-type">
              <button class="sort-btn" data-sort="finding_type">Type</button>
            </th>
            <th class="th-summary">Summary</th>
            <th class="th-persona">
              <button class="sort-btn" data-sort="target_persona">Persona</button>
            </th>
            <th class="th-industry">
              <button class="sort-btn" data-sort="industry">Industry</button>
            </th>
            <th class="th-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="findingsBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>



<script src="./auth.js"></script>
<script src="./data.js"></script>
<script src="./app.js"></script>
</body>
</html>
